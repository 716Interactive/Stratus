ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.slamstudios.stratus.ApplicationKt.module ]
    }
}

stratus {
    # Bearer token required on all protected endpoints — override via env var in prod
    token = "changeme"
    token = ${?STRATUS_TOKEN}

    database {
        host     = "localhost"
        host     = ${?DATABASE_HOST}
        port     = 3306
        port     = ${?DATABASE_PORT}
        name     = "stratus"
        name     = ${?DATABASE_NAME}
        user     = "stratus"
        user     = ${?DATABASE_USER}
        password = "changeme"
        password = ${?DATABASE_PASSWORD}
        poolSize = 10
    }

    redis {
        host     = "localhost"
        host     = ${?REDIS_HOST}
        port     = 6379
        port     = ${?REDIS_PORT}
        password = ""
        password = ${?REDIS_PASSWORD}
    }

    pterodactyl {
        baseUrl = "http://localhost"
        baseUrl = ${?PTERODACTYL_URL}
        apiKey  = "changeme"
        apiKey  = ${?PTERODACTYL_API_KEY}
        ownerId = 1
        ownerId = ${?PTERODACTYL_OWNER_ID}
        orchestratorUrl = "http://localhost:8080"
        orchestratorUrl = ${?STRATUS_URL}
    }
}
